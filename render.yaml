services:
  - type: web
    name: panobianco-ia
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port 10000"
    envVars:
      # MODO SEM LOGIN (apenas teste!) — true desliga toda a autenticação.
      # Mude para "false" para voltar a exigir login.
      - key: AUTH_DISABLED
        value: "true"
      - key: OPENROUTER_API_KEY
        sync: false
      - key: CHATWOOT_URL
        sync: false
      - key: CHATWOOT_TOKEN
        sync: false
      - key: CHATWOOT_WEBHOOK_SECRET
        sync: false